baseURL = 'https://bor1e.github.io/'
languageCode = 'de'
defaultContentLanguage = 'de'
title = 'Elyahu Borodin'

[params]
  description = 'AI-Architekt & Jüdischer Lehrer – One Blog, Two Perspectives'
  author = 'Elyahu Borodin'


[taxonomies]
  tag = 'tags'
  category = 'categories'
  persona = 'personas'

[menus]
  [[menus.main]]
    name = 'Home'
    url = '/'
    weight = 1
  [[menus.main]]
    name = 'Tech'
    url = '/tech/'
    weight = 2
  [[menus.main]]
    name = 'Lehre'
    url = '/lehre/'
    weight = 3
  [[menus.main]]
    name = 'About'
    url = '/about/'
    weight = 4

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.asciidocExt]
    backend = 'html5'
    extensions = ['asciidoctor-diagram']
    workingFolderCurrent = true
    [markup.asciidocExt.attributes]
      'source-highlighter' = 'rouge'
      'icons' = 'font'
      'imagesdir' = '/images/'

[security]
  [security.exec]
    allow = ['^(dart-)?sass(-embedded)?$', '^go$', '^git$', '^npx$', '^postcss$', '^asciidoctor$']
  [security.http]
    methods = ['(?i)GET|POST']
    urls = ['.*']

[outputs]
  home = ['HTML', 'RSS']
  section = ['HTML', 'RSS']

[sitemap]
  changeFreq = 'weekly'
  priority = 0.5

enableRobotsTXT = true
